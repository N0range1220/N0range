<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DorkHunt // 搜索语法生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e0a;
    --bg-2: #0f1410;
    --panel: #121812;
    --panel-2: #161e16;
    --border: #1f2a1f;
    --border-bright: #2a3a2a;
    --fg: #d4f5d4;
    --fg-dim: #7a9a7a;
    --fg-muted: #4a6a4a;
    --neon: #00ff9c;
    --neon-dim: #00cc7a;
    --orange: #ff6b35;
    --red: #ff2e63;
    --yellow: #ffd23f;
    --cyan: #4ad8e6;
    --google: #4285f4;
    --bing: #008373;
    --baidu: #2932e1;
    --mono: 'JetBrains Mono', 'IBM Plex Mono', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 扫描线 / 网格背景纹理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 156, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 156, 0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0) 0px,
      rgba(0, 0, 0, 0) 2px,
      rgba(0, 0, 0, 0.15) 3px,
      rgba(0, 0, 0, 0) 4px
    );
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
  }

  .app {
    position: relative;
    z-index: 2;
    max-width: 1480px;
    margin: 0 auto;
    padding: 18px;
  }

  /* === 顶部终端标题栏 === */
  .titlebar {
    display: flex;
    align-items: center;
    gap: 16px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    border: 1px solid var(--border-bright);
    border-bottom: 2px solid var(--neon-dim);
    padding: 10px 16px;
    box-shadow: 0 0 24px rgba(0, 255, 156, 0.08), inset 0 1px 0 rgba(0, 255, 156, 0.1);
  }
  .dots { display: flex; gap: 7px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 0 4px rgba(0,0,0,0.4); }
  .dot.r { background: var(--red); }
  .dot.y { background: var(--yellow); }
  .dot.g { background: var(--neon); }
  .title {
    font-weight: 800;
    font-size: 15px;
    color: var(--neon);
    letter-spacing: 0.5px;
    text-shadow: 0 0 8px rgba(0, 255, 156, 0.5);
    flex: 1;
  }
  .title .cursor { animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* 引擎切换器 */
  .engine-switch {
    display: flex;
    border: 1px solid var(--border-bright);
    background: var(--bg);
  }
  .engine-btn {
    background: transparent;
    border: none;
    border-right: 1px solid var(--border-bright);
    color: var(--fg-dim);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    position: relative;
  }
  .engine-btn:last-child { border-right: none; }
  .engine-btn:hover { color: var(--fg); background: rgba(0, 255, 156, 0.05); }
  .engine-btn.active { color: #fff; font-weight: 700; }
  .engine-btn.active[data-engine="google"] { background: var(--google); box-shadow: 0 0 12px rgba(66,133,244,0.6); }
  .engine-btn.active[data-engine="bing"] { background: var(--bing); box-shadow: 0 0 12px rgba(0,131,115,0.6); }
  .engine-btn.active[data-engine="baidu"] { background: var(--baidu); box-shadow: 0 0 12px rgba(41,50,225,0.6); }

  /* 返回资源站链接 */
  .back-link {
    display: flex;
    align-items: center;
    height: 30px;
    padding: 0 12px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--neon);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .back-link:hover {
    border-color: var(--neon);
    box-shadow: 0 0 12px rgba(0,255,156,0.3);
  }
  @media (max-width: 768px) {
    .back-link { display: none; }
  }

  /* === 主布局 === */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr 400px;
    gap: 16px;
    margin-top: 16px;
  }

  .panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(0,255,156,0.02), inset 0 1px 0 rgba(255,255,255,0.02);
  }
  .panel-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,255,156,0.03);
    font-size: 11px;
    font-weight: 700;
    color: var(--neon-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .panel-head .pip { color: var(--neon); }
  .panel-body { padding: 14px; }

  /* === 左侧分类导航 === */
  .cat-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--fg-dim);
  }
  .cat-card:hover {
    border-color: var(--border-bright);
    color: var(--fg);
    background: var(--panel-2);
  }
  .cat-card.active {
    border-left-color: var(--neon);
    background: rgba(0,255,156,0.06);
    color: var(--neon);
    box-shadow: inset 0 0 16px rgba(0,255,156,0.05);
  }
  .cat-card .ico {
    font-size: 18px;
    width: 22px;
    text-align: center;
    text-shadow: 0 0 6px currentColor;
  }
  .cat-card .label { font-weight: 600; font-size: 13px; }
  .cat-card .count {
    margin-left: auto;
    font-size: 10px;
    color: var(--fg-muted);
    background: var(--bg-2);
    padding: 2px 6px;
    border: 1px solid var(--border);
  }
  .cat-card.active .count { color: var(--neon); border-color: var(--neon-dim); }

  .side-stat {
    margin-top: 14px;
    padding: 12px;
    border: 1px dashed var(--border);
    background: var(--bg);
    font-size: 11px;
    color: var(--fg-muted);
    line-height: 1.7;
  }
  .side-stat b { color: var(--neon-dim); }
  .side-stat .row { display: flex; justify-content: space-between; }

  /* === 中部操作符区 === */
  .ops-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }
  .op {
    border: 1px solid var(--border);
    background: var(--bg);
    padding: 0;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .op.unsupported { opacity: 0.4; }
  .op.unsupported::after {
    content: '不支持';
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 9px;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 1px 5px;
    background: rgba(255,46,99,0.1);
    letter-spacing: 1px;
  }
  .op-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    cursor: pointer;
    user-select: none;
  }
  .op-head:hover { background: var(--panel-2); }
  .op-toggle {
    width: 14px; height: 14px;
    border: 1px solid var(--border-bright);
    background: var(--bg-2);
    position: relative;
    flex-shrink: 0;
  }
  .op.enabled .op-toggle {
    background: var(--neon);
    border-color: var(--neon);
    box-shadow: 0 0 8px rgba(0,255,156,0.6);
  }
  .op.enabled .op-toggle::after {
    content: '▸';
    position: absolute;
    inset: 0;
    color: #000;
    font-size: 10px;
    text-align: center;
    line-height: 12px;
    font-weight: 900;
  }
  .op-name {
    font-weight: 700;
    color: var(--neon);
    font-size: 13px;
  }
  .op.unsupported .op-name { color: var(--fg-muted); }
  .op-label { color: var(--fg-dim); font-size: 11px; margin-left: auto; }
  .op-syntax {
    font-size: 10px;
    color: var(--orange);
    padding: 0 12px 8px;
    font-family: var(--mono);
  }
  .op-input-wrap { padding: 0 12px 12px; display: none; }
  .op.enabled .op-input-wrap { display: block; }
  .op-input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 9px;
    outline: none;
    transition: border-color 0.15s;
  }
  .op-input:focus { border-color: var(--neon); box-shadow: 0 0 0 1px var(--neon-dim); }
  .op-input::placeholder { color: var(--fg-muted); }
  textarea.op-input { resize: vertical; min-height: 50px; line-height: 1.5; }
  .op-hint { font-size: 10px; color: var(--fg-muted); margin-top: 4px; }

  /* 敏感/日常预设区 */
  .preset-group { margin-bottom: 18px; }
  .preset-group-title {
    font-size: 11px;
    color: var(--orange);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
    border-left: 2px solid var(--orange);
    padding-left: 8px;
  }
  .preset-group.daily .preset-group-title { color: var(--cyan); border-left-color: var(--cyan); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .chip:hover { border-color: var(--orange); color: var(--orange); }
  .chip.active {
    background: rgba(255,107,53,0.15);
    border-color: var(--orange);
    color: var(--orange);
    box-shadow: 0 0 8px rgba(255,107,53,0.3);
  }
  .preset-group.daily .chip:hover { border-color: var(--cyan); color: var(--cyan); }
  .preset-group.daily .chip.active {
    background: rgba(74,216,230,0.15);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 8px rgba(74,216,230,0.3);
  }

  /* 漏洞模板区 */
  .vuln-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .vuln-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: 2px solid var(--red);
    padding: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .vuln-card:hover {
    border-color: var(--red);
    border-top-color: var(--red);
    background: rgba(255,46,99,0.05);
    box-shadow: 0 0 16px rgba(255,46,99,0.15);
    transform: translateY(-1px);
  }
  .vuln-card.active {
    border-color: var(--red);
    background: rgba(255,46,99,0.1);
    box-shadow: 0 0 20px rgba(255,46,99,0.3);
  }
  .vuln-name {
    color: var(--red);
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .vuln-desc { color: var(--fg-dim); font-size: 11px; margin-bottom: 8px; line-height: 1.5; }
  .vuln-query {
    font-size: 10px;
    color: var(--yellow);
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 6px 8px;
    word-break: break-all;
    line-height: 1.5;
  }

  /* === 右侧结果区 === */
  .result-panel { position: sticky; top: 18px; align-self: start; }
  .result-engine-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    letter-spacing: 1px;
    margin-left: auto;
  }
  .result-display {
    background: var(--bg);
    border: 1px solid var(--border-bright);
    margin: 0 14px 12px;
    min-height: 90px;
    position: relative;
  }
  .result-line {
    display: flex;
    font-size: 12px;
    line-height: 1.7;
  }
  .result-lineno {
    color: var(--fg-muted);
    padding: 0 10px;
    user-select: none;
    text-align: right;
    min-width: 28px;
    border-right: 1px solid var(--border);
  }
  .result-text {
    padding: 0 12px;
    color: var(--fg);
    word-break: break-all;
    flex: 1;
  }
  .tok-op { color: var(--neon); font-weight: 700; }
  .tok-val { color: var(--fg); }
  .tok-quote { color: var(--orange); }
  .tok-sym { color: var(--yellow); }
  .tok-range { color: var(--cyan); }
  .result-empty { color: var(--fg-muted); font-style: italic; padding: 20px 14px; text-align: center; }

  /* URL 预览 */
  .url-preview {
    margin: 0 14px 12px;
    padding: 8px 10px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--cyan);
    word-break: break-all;
    line-height: 1.5;
    display: none;
  }
  .url-preview.show { display: block; }
  .url-preview .label { color: var(--fg-muted); margin-right: 4px; }

  .result-warn {
    margin: 0 14px 12px;
    padding: 8px 10px;
    border: 1px solid var(--orange);
    background: rgba(255,107,53,0.08);
    color: var(--orange);
    font-size: 11px;
    line-height: 1.5;
    display: none;
  }
  .result-warn.show { display: block; }

  /* URL 增强控件 */
  .enhance-section {
    margin: 0 14px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .enhance-head {
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 1px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .enhance-head:hover { background: var(--panel-2); }
  .enhance-body { padding: 10px; display: none; }
  .enhance-section.open .enhance-body { display: block; }
  .enhance-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 11px;
  }
  .enhance-row:last-child { margin-bottom: 0; }
  .enhance-row label {
    color: var(--fg-dim);
    min-width: 56px;
    font-weight: 600;
  }
  .enhance-row select {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 6px;
    outline: none;
    cursor: pointer;
  }
  .enhance-row select:focus { border-color: var(--cyan); }
  .enhance-hint { font-size: 9px; color: var(--fg-muted); margin-top: 4px; line-height: 1.5; }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 14px 14px;
  }
  .btn {
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .btn:hover { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 12px rgba(0,255,156,0.2); }
  .btn-primary {
    background: var(--neon);
    color: #000;
    border-color: var(--neon);
    font-weight: 700;
  }
  .btn-primary:hover { background: var(--neon-dim); box-shadow: 0 0 20px rgba(0,255,156,0.5); color: #000; }
  .btn-danger:hover { border-color: var(--red); color: var(--red); box-shadow: 0 0 12px rgba(255,46,99,0.2); }
  .btn-full { grid-column: 1 / -1; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--neon);
    color: #000;
    font-weight: 700;
    font-size: 12px;
    padding: 10px 20px;
    border: 1px solid var(--neon);
    box-shadow: 0 0 24px rgba(0,255,156,0.5);
    opacity: 0;
    transition: all 0.25s;
    z-index: 100;
    letter-spacing: 0.5px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footer-note {
    margin-top: 16px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: var(--panel);
    font-size: 10px;
    color: var(--fg-muted);
    line-height: 1.6;
    letter-spacing: 0.3px;
  }
  .footer-note b { color: var(--neon-dim); }

  /* 响应式 */
  @media (max-width: 1280px) {
    .layout { grid-template-columns: 200px 1fr; }
    .result-panel { grid-column: 1 / -1; position: static; }
  }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .titlebar { flex-wrap: wrap; }
    .title { font-size: 13px; }
    .ops-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- 顶部标题栏 -->
  <div class="titlebar">
    <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <div class="title">root@dorkhunt:~# <span class="cursor">▌</span></div>
    <div class="engine-switch" id="engineSwitch">
      <button class="engine-btn active" data-engine="google">GOOGLE</button>
      <button class="engine-btn" data-engine="bing">BING</button>
      <button class="engine-btn" data-engine="baidu">百度</button>
    </div>
    <a href="index.html" class="back-link" title="返回资源站">← 资源站</a>
  </div>

  <!-- 主布局 -->
  <div class="layout">
    <!-- 左侧分类 -->
    <div class="panel">
      <div class="panel-head"><span class="pip">▸</span> 搜索范围</div>
      <div class="panel-body">
        <div class="cat-list" id="catList"></div>
        <div class="side-stat" id="sideStat"></div>
      </div>
    </div>

    <!-- 中部操作区 -->
    <div class="panel">
      <div class="panel-head">
        <span class="pip">▸</span>
        <span id="centerTitle">操作符配置</span>
        <span class="result-engine-badge" id="centerEngineBadge"></span>
      </div>
      <div class="panel-body" id="centerBody"></div>
    </div>

    <!-- 右侧结果 -->
    <div class="panel result-panel">
      <div class="panel-head">
        <span class="pip">▸</span> 语法输出
        <span class="result-engine-badge" id="resultEngineBadge"></span>
      </div>
      <div class="result-display" id="resultDisplay">
        <div class="result-empty">// 尚未启用任何操作符<br>// 在左侧选择分类并勾选操作符开始构建语法</div>
      </div>
      <div class="url-preview" id="urlPreview"><span class="label">URL:</span><span id="urlPreviewText"></span></div>
      <div class="result-warn" id="resultWarn"></div>

      <!-- URL 增强参数 -->
      <div class="enhance-section" id="enhanceSection">
        <div class="enhance-head" id="enhanceHead"><span>+</span> URL 增强参数（结果数/时间/语言）</div>
        <div class="enhance-body">
          <div class="enhance-row">
            <label>结果数</label>
            <select id="enhNum">
              <option value="">默认</option>
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div class="enhance-row">
            <label>时间过滤</label>
            <select id="enhTime">
              <option value="">不限</option>
              <option value="d">一天内</option>
              <option value="w">一周内</option>
              <option value="m">一月内</option>
              <option value="y">一年内</option>
            </select>
          </div>
          <div class="enhance-row">
            <label>语言</label>
            <select id="enhLang">
              <option value="">不限</option>
              <option value="zh">中文</option>

};

/* ============================================================
   工具函数
============================================================ */
function getOp(id) { return OPERATORS.find(o => o.id === id); }
function isOpSupported(op) { return op && op.syntax[state.engine] !== null && op.syntax[state.engine] !== undefined; }

function buildOpTokens(op, rawValue, engine) {
  const syntax = op.syntax[engine];
  if (!syntax) return [];
  const values = op.multi ? rawValue.split('\n').map(s=>s.trim()).filter(Boolean) : [rawValue.trim()];
  const tokens = [];
  for (const v of values) {
    if (!v) continue;
    switch (op.type) {
      case 'prefix': tokens.push(`${syntax}${v}`); break;
      case 'exact':  tokens.push(`"${v}"`); break;
      case 'exclude':tokens.push(`-${v}`); break;
      case 'range':  tokens.push(v); break;  // 范围值原样输出（如 $50..$100）
      case 'raw':    tokens.push(v); break;
    }
  }
  return tokens;
}

function checkTemplateCompat(query, engine) {
  const opRegex = /(-?(?:site|inurl|intitle|intext|inbody|filetype|cache|related|link|inanchor|allintitle|allinurl|author|define|info|contains|loc|before|after|daterange|source|map|weather|movie|book|stocks|language|ip|feed|hasfeed|url|domain):)/g;
  const found = [...query.matchAll(opRegex)].map(m=>m[1].replace(/^-/,'').replace(':',''));
  const unsupported = [];
  for (const f of found) {
    const op = OPERATORS.find(o => o.name === f);
    if (op && !isOpSupported(op)) unsupported.push(f);
  }
  return { ok: unsupported.length === 0, unsupported };
}

function generateQuery() {
  if (state.activeTemplate) {
    const t = TEMPLATES.find(v => v.id === state.activeTemplate);
    return t ? t.query : '';
  }
  const parts = [];
  // 仅遍历已启用的操作符
  for (const opId of state.enabledOps) {
    const op = getOp(opId);
    if (!op) continue;
    if (!isOpSupported(op)) continue; // 不支持的跳过
    const val = state.opValues[opId] || '';
    if (val.trim()) parts.push(...buildOpTokens(op, val, state.engine));
  }
  for (const key of state.activePresets) {
    const [opId, val] = key.split('::');
    const op = getOp(opId);
    if (op && isOpSupported(op)) {
      parts.push(...buildOpTokens(op, val, state.engine));
    }
  }
  return parts.filter(Boolean).join(' ');
}

function generateWarnings() {
  const warns = [];
  // 检查已启用但不支持的操作符
  for (const opId of state.enabledOps) {
    const op = getOp(opId);
    if (op && !isOpSupported(op)) {
      warns.push(`操作符 [${op.name}] 在 ${ENGINES[state.engine].name} 中不支持，已跳过`);
    }
    // 已启用但未填值
    if (op && isOpSupported(op) && !(state.opValues[opId] || '').trim()) {
      warns.push(`操作符 [${op.name}] 已启用但未填写值`);
    }
  }
  if (state.activeTemplate) {
    const t = TEMPLATES.find(v => v.id === state.activeTemplate);
    if (t) {
      const c = checkTemplateCompat(t.query, state.engine);
      if (!c.ok) warns.push(`模板 [${t.name}] 使用了 ${ENGINES[state.engine].name} 不支持的操作符: ${c.unsupported.join(', ')}`);
    }
  }
  return warns;
}

// 构建最终搜索 URL（含增强参数）
function buildSearchUrl(query) {
  const base = ENGINES[state.engine].url + encodeURIComponent(query);
  const params = [];
  const e = state.engine;
  const u = state.urlEnhance;
  if (u.num) {
    const key = URL_ENHANCE.num[e];
    if (key) params.push(`${key}=${u.num}`);
  }
  if (u.time) {
    const map = URL_ENHANCE.time[e];
    if (map && map[u.time]) params.push(map[u.time]);
  }
  if (u.lang) {
    const map = URL_ENHANCE.lang[e];
    if (map && map[u.lang]) params.push(map[u.lang]);
  }
  return params.length ? `${base}&${params.join('&')}` : base;
}

// 语法高亮
function highlight(text) {
  if (!text) return '<span style="color:var(--fg-muted);font-style:italic;">// 空查询</span>';
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 操作符前缀（含 -前缀: 排除形式，整体高亮）
  s = s.replace(/(^|\s)(-?(?:site|inurl|intitle|intext|inbody|filetype|ext|cache|related|link|inanchor|allintitle|allinurl|author|define|info|contains|loc|before|after|daterange|source|map|weather|movie|book|stocks|language|ip|feed|hasfeed|url|domain):)/g,
    '$1<span class="tok-op">$2</span>');
  // 数字范围（含$）
  s = s.replace(/(\$?\d+\.\.\$?\d*)|(\$\d*\.\.\$?\d+)/g, '<span class="tok-range">$1$2</span>');
  // 引号内容
  s = s.replace(/"([^"]*)"/g, '<span class="tok-quote">"$1"</span>');
  // OR / |
  s = s.replace(/\b(OR)\b/g, '<span class="tok-sym">$1</span>');
  s = s.replace(/\|/g, '<span class="tok-sym">|</span>');
  // 排除符号（仅匹配未被前面操作符正则吃掉的 -关键词）
  s = s.replace(/(^|\s)(-)(\w+)/g, '$1<span class="tok-sym">$2</span><span class="tok-val">$3</span>');
  return s;
}

/* ============================================================
   渲染
============================================================ */
const $ = id => document.getElementById(id);

function renderCategories() {
  const counts = {
    common: OPERATORS.filter(o=>o.cat==='common').length,
    daily: OPERATORS.filter(o=>o.cat==='daily').length,
    advanced: OPERATORS.filter(o=>o.cat==='advanced').length,
    sensitive: Object.values(SENSITIVE_PRESETS).reduce((s,g)=>s+g.items.length,0),
    vuln: TEMPLATES.length
  };
  $('catList').innerHTML = CATEGORIES.map(c => `
    <div class="cat-card ${state.activeCategory===c.id?'active':''}" data-cat="${c.id}">
      <span class="ico">${c.icon}</span>
      <span class="label">${c.name}</span>
      <span class="count">${counts[c.id]}</span>
    </div>
  `).join('');
  $('catList').querySelectorAll('.cat-card').forEach(el => {
    el.addEventListener('click', () => {
      state.activeCategory = el.dataset.cat;
      renderCategories();
      renderCenter();
    });
  });
  const enabledCount = state.enabledOps.size
    + state.activePresets.size + (state.activeTemplate?1:0);
  $('sideStat').innerHTML = `
    <div class="row"><span>当前引擎</span><b>${ENGINES[state.engine].name}</b></div>
    <div class="row"><span>已启用项</span><b>${enabledCount}</b></div>
    <div class="row"><span>当前分类</span><b>${CATEGORIES.find(c=>c.id===state.activeCategory).name}</b></div>
  `;
}

function renderEngineBadges() {
  const e = ENGINES[state.engine];
  const badge = `<span style="background:${e.color};color:#fff;padding:2px 7px;">${e.name.toUpperCase()}</span>`;
  $('centerEngineBadge').innerHTML = badge;
  $('resultEngineBadge').innerHTML = badge;
}

function renderCenter() {
  const cat = state.activeCategory;
  $('centerTitle').textContent = CATEGORIES.find(c=>c.id===cat).name + ' 配置';
  if (cat === 'common' || cat === 'advanced' || cat === 'daily') {
    renderOperators(cat);
  } else if (cat === 'sensitive') {
    renderPresets(SENSITIVE_PRESETS, false);
  } else if (cat === 'vuln') {
    renderVuln();
  }
  renderResult();
}

function renderFiletypeChips() {
  let html = '<div class="ft-presets" style="margin-top:10px;border-top:1px dashed var(--border);padding-top:8px;">';
  html += '<div style="font-size:10px;color:var(--cyan);margin-bottom:6px;letter-spacing:0.5px;">▸ 快捷文件类型（点击添加）</div>';
  for (const g of FILETYPE_PRESETS) {
    html += `<div style="margin-bottom:5px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;"><span style="font-size:9px;color:var(--fg-muted);min-width:42px;">${g.title}</span>`;
    for (const ft of g.items) {
      html += `<span class="chip ft-chip" data-ft="${ft}" style="font-size:10px;padding:3px 7px;">${ft}</span>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderOperators(cat) {
  const ops = OPERATORS.filter(o => o.cat === cat);
  $('centerBody').innerHTML = ops.map(op => {
    const supported = isOpSupported(op);
    const enabled = state.enabledOps.has(op.id);  // 用独立 Set 判断
    const syntaxDisplay = supported ? op.syntax[state.engine] : '不支持';
    return `
      <div class="op ${enabled?'enabled':''} ${supported?'':'unsupported'}" data-op="${op.id}">
        <div class="op-head">
          <div class="op-toggle"></div>
          <span class="op-name">${op.name}</span>
          <span class="op-label">${op.label}</span>
        </div>
        <div class="op-syntax">${supported ? '语法: ' + syntaxDisplay : '当前引擎不支持此操作符'}</div>
        <div class="op-input-wrap">
          ${op.multi
            ? `<textarea class="op-input" placeholder="${op.ph}（多个值请换行）">${state.opValues[op.id]||''}</textarea>
               <div class="op-hint">每行一个值，将分别生成语法</div>`
            : `<input class="op-input" type="text" placeholder="${op.ph}" value="${(state.opValues[op.id]||'').replace(/"/g,'&quot;')}">`
          }
          ${op.id === 'filetype' ? renderFiletypeChips() : ''}
        </div>
      </div>
    `;
  }).join('');

  $('centerBody').querySelectorAll('.op').forEach(el => {
    const opId = el.dataset.op;
    const op = getOp(opId);
    el.querySelector('.op-head').addEventListener('click', () => {
      if (!isOpSupported(op)) { showToast('该操作符在当前引擎不支持'); return; }
      if (state.activeTemplate) state.activeTemplate = null;
      // 切换 enabledOps
      if (state.enabledOps.has(opId)) {
        state.enabledOps.delete(opId);
        delete state.opValues[opId];
      } else {
        state.enabledOps.add(opId);
        if (!state.opValues[opId]) state.opValues[opId] = '';
      }
      renderCenter();
      // 重新渲染后聚焦输入框
      if (state.enabledOps.has(opId)) {
        setTimeout(() => {
          const newInput = document.querySelector(`.op[data-op="${opId}"] .op-input`);
          if (newInput) newInput.focus();
        }, 0);
      }
      renderCategories();
    });
    const input = el.querySelector('.op-input');
    if (input) {
      input.addEventListener('input', () => {
        state.opValues[opId] = input.value;
        renderResult();
        renderCategories();
      });
      input.addEventListener('click', e => e.stopPropagation());
    }
  });

  // 文件类型快捷 chips：点击追加到 filetype 输入框（不触发全量渲染以保持焦点）
  $('centerBody').querySelectorAll('.ft-chip').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const ft = el.dataset.ft;
      // 确保 filetype 操作符已启用
      if (!state.enabledOps.has('filetype')) {
        state.enabledOps.add('filetype');
        if (!state.opValues['filetype']) state.opValues['filetype'] = '';
      }
      const cur = state.opValues['filetype'] || '';
      const lines = cur.split('\n').map(s=>s.trim()).filter(Boolean);
      if (!lines.includes(ft)) lines.push(ft);
      state.opValues['filetype'] = lines.join('\n');
      // 仅同步输入框 value，不重新渲染整个中心区
      const ta = document.querySelector('.op[data-op="filetype"] .op-input');
      if (ta) ta.value = state.opValues['filetype'];
      renderResult();
      renderCategories();
    });
  });
}

// 通用预设渲染（敏感文件/日常搜索共用）
function renderPresets(presetGroups, isDaily) {
  let html = `<div style="font-size:11px;color:${isDaily?'var(--cyan)':'var(--fg-dim)'};margin-bottom:14px;line-height:1.6;">` +
    (isDaily
      ? '◉ 点击预设项快速添加到语法。青色高亮表示已添加。切换引擎时自动适配支持的语法。'
      : '▸ 点击预设项快速添加到语法。橙色高亮表示已添加。切换引擎时自动适配支持的语法。') +
    '</div>';
  for (const [groupKey, group] of Object.entries(presetGroups)) {
    const isUnsupportedGroup = isDaily && groupKey === 'langBing' && state.engine !== 'bing';
    html += `<div class="preset-group ${isDaily?'daily':''}">
      <div class="preset-group-title">${group.title}</div>
      <div class="chips">`;
    for (const item of group.items) {
      const op = getOp(item.op);
      const supported = isOpSupported(op);
      const key = `${item.op}::${item.val}`;
      const active = state.activePresets.has(key);
      html += `<div class="chip ${active?'active':''}" data-key="${key}" data-op="${item.op}" data-val="${item.val}"
        style="${supported?'':'opacity:0.4;text-decoration:line-through;cursor:not-allowed;'}"
        title="${supported?'添加 '+item.op+':'+item.val : ENGINES[state.engine].name+' 不支持 '+item.op}">${item.label}</div>`;
    }
    html += `</div></div>`;
  }
  html += `<div style="margin-top:8px;"><button class="btn btn-danger" id="clearPresets" style="width:100%;">✕ 清除所有预设</button></div>`;
  $('centerBody').innerHTML = html;

  $('centerBody').querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      const op = getOp(el.dataset.op);
      if (!isOpSupported(op)) { showToast(`${ENGINES[state.engine].name} 不支持 ${el.dataset.op}`); return; }
      if (state.activeTemplate) state.activeTemplate = null;
      const key = el.dataset.key;
      if (state.activePresets.has(key)) state.activePresets.delete(key);
      else state.activePresets.add(key);
      renderPresets(presetGroups, isDaily);
      renderCategories();
    });
  });
  const cp = $('clearPresets');
  if (cp) cp.addEventListener('click', () => {
    state.activePresets.clear();
    renderPresets(presetGroups, isDaily);
    renderCategories();
  });
}

function renderVuln() {
  let html = '<div style="font-size:11px;color:var(--fg-dim);margin-bottom:14px;line-height:1.6;">' +
    '▤ 点击模板卡片一键填入语法。激活模板后将覆盖操作符配置；切换引擎会检测兼容性并提示。占位词（括号内）请按需替换。</div>';
  const groups = [
    { id:'security', title:'安全研究模板', color:'var(--red)',  icon:'☠' },
    { id:'daily',    title:'日常搜索模板', color:'var(--cyan)', icon:'◉' }
  ];
  for (const g of groups) {
    const items = TEMPLATES.filter(t => t.group === g.id);
    if (!items.length) continue;
    html += `<div style="font-size:11px;font-weight:700;color:${g.color};letter-spacing:1px;margin:14px 0 8px;border-left:2px solid ${g.color};padding-left:8px;text-transform:uppercase;">${g.icon} ${g.title}</div>`;
    html += '<div class="vuln-grid">';
    for (const t of items) {
      const active = state.activeTemplate === t.id;
      const style = active
        ? (g.id==='daily'
            ? 'border:1px solid var(--cyan);border-top:2px solid var(--cyan);background:rgba(74,216,230,0.1);box-shadow:0 0 20px rgba(74,216,230,0.3);'
            : 'border:1px solid var(--red);border-top:2px solid var(--red);background:rgba(255,46,99,0.1);box-shadow:0 0 20px rgba(255,46,99,0.3);')
        : `border-top:2px solid ${g.color};`;
      html += `<div class="vuln-card" data-tpl="${t.id}" style="${style}">
        <div class="vuln-name" style="color:${g.color};">${g.icon} ${t.name}</div>
        <div class="vuln-desc">${t.desc}</div>
        <div class="vuln-query">${t.query.replace(/</g,'&lt;')}</div>
      </div>`;
    }
    html += '</div>';
  }
  html += `<div style="margin-top:12px;"><button class="btn btn-danger" id="clearTpl" style="width:100%;">✕ 取消模板选择</button></div>`;
  $('centerBody').innerHTML = html;

  $('centerBody').querySelectorAll('.vuln-card').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.tpl;
      state.activeTemplate = state.activeTemplate === id ? null : id;
      renderVuln();
      renderCategories();
    });
  });
  const ct = $('clearTpl');
  if (ct) ct.addEventListener('click', () => {
    state.activeTemplate = null;
    renderVuln();
    renderCategories();
  });
}

function renderResult() {
  const q = generateQuery();
  const warns = generateWarnings();
  const display = $('resultDisplay');
  if (!q) {
    display.innerHTML = '<div class="result-empty">// 尚未启用任何操作符<br>// 在左侧选择分类并勾选操作符开始构建语法</div>';
    $('urlPreview').classList.remove('show');
  } else {
    const lines = q.split('\n');
    display.innerHTML = lines.map((line, i) => `
      <div class="result-line">
        <div class="result-lineno">${i+1}</div>
        <div class="result-text">${highlight(line)}</div>
      </div>
    `).join('');
    // URL 预览
    const url = buildSearchUrl(q);
    $('urlPreviewText').textContent = url;
    $('urlPreview').classList.add('show');
  }
  const warnEl = $('resultWarn');
  if (warns.length) {
    warnEl.innerHTML = '⚠ ' + warns.join('<br>⚠ ');
    warnEl.classList.add('show');
  } else {
    warnEl.classList.remove('show');
  }
}

function renderEnhanceHint() {
  const e = state.engine;
  const parts = [];
  if (state.urlEnhance.time && (!URL_ENHANCE.time[e] || !URL_ENHANCE.time[e][state.urlEnhance.time])) parts.push('时间过滤');
  if (state.urlEnhance.lang && (!URL_ENHANCE.lang[e] || !URL_ENHANCE.lang[e][state.urlEnhance.lang])) parts.push('语言');
  if (state.urlEnhance.num && !URL_ENHANCE.num[e]) parts.push('结果数');
  $('enhHint').textContent = parts.length
    ? `// ${ENGINES[e].name} 不支持: ${parts.join('、')}，已忽略`
    : '// 部分参数仅特定引擎支持，切换引擎时自动忽略不支持的项';
}

/* ============================================================
   交互
============================================================ */
function setEngine(eng) {
  state.engine = eng;
  $('engineSwitch').querySelectorAll('.engine-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.engine === eng);
  });
  // 清除当前引擎不支持的预设
  for (const key of [...state.activePresets]) {
    const [opId] = key.split('::');
    const op = getOp(opId);
    if (!isOpSupported(op)) state.activePresets.delete(key);
  }
  // 清除当前引擎不支持的操作符（保留值，仅移除启用标记）
  for (const opId of [...state.enabledOps]) {
    const op = getOp(opId);
    if (op && !isOpSupported(op)) state.enabledOps.delete(opId);
  }
  renderEngineBadges();
  renderCenter();
  renderCategories();
  renderEnhanceHint();
}

$('engineSwitch').addEventListener('click', e => {
  const btn = e.target.closest('.engine-btn');
  if (btn) setEngine(btn.dataset.engine);
});

$('btnCopy').addEventListener('click', async () => {
  const q = generateQuery();
  if (!q) { showToast('语法为空，无法复制'); return; }
  try {
    await navigator.clipboard.writeText(q);
    showToast('✓ 已复制语法到剪贴板');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = q; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast('✓ 已复制语法到剪贴板'); }
    catch { showToast('✕ 复制失败，请手动选择'); }
    document.body.removeChild(ta);
  }
});

$('btnSearch').addEventListener('click', () => {
  const q = generateQuery();
  if (!q) { showToast('语法为空'); return; }
  const url = buildSearchUrl(q);
  window.open(url, '_blank', 'noopener');
});

$('btnReset').addEventListener('click', () => {
  state.opValues = {};
  state.enabledOps.clear();
  state.activePresets.clear();
  state.activeTemplate = null;
  state.urlEnhance = { num:'', time:'', lang:'' };
  $('enhNum').value = '';
  $('enhTime').value = '';
  $('enhLang').value = '';
  renderCenter();
  renderResult();
  renderCategories();
  renderEnhanceHint();
  showToast('✓ 已重置全部');
});

// URL 增强控件
$('enhanceHead').addEventListener('click', () => {
  $('enhanceSection').classList.toggle('open');
});
$('enhNum').addEventListener('change', e => { state.urlEnhance.num = e.target.value; renderResult(); renderEnhanceHint(); });
$('enhTime').addEventListener('change', e => { state.urlEnhance.time = e.target.value; renderResult(); renderEnhanceHint(); });
$('enhLang').addEventListener('change', e => { state.urlEnhance.lang = e.target.value; renderResult(); renderEnhanceHint(); });

let toastTimer;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================================
   初始化
============================================================ */
renderCategories();
renderEngineBadges();
renderCenter();
renderResult();
renderEnhanceHint();
</script>
</body>
</html>
