<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NewsNow // 热点聚合</title>
<meta name="description" content="聚合微博、知乎、B站、抖音、百度、头条、网易、IT之家等多平台实时热点，一页纵览全网。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e0a; --bg-2: #0f1410;
    --panel: #121812; --panel-2: #161e16;
    --border: #1f2a1f; --border-bright: #2a3a2a;
    --fg: #d4f5d4; --fg-dim: #7a9a7a; --fg-muted: #4a6a4a;
    --neon: #00ff9c; --neon-dim: #00cc7a;
    --orange: #ff6b35; --red: #ff2e63; --yellow: #ffd23f; --cyan: #4ad8e6;
    --mono: 'JetBrains Mono', 'IBM Plex Mono', 'Consolas', monospace;
  }
  :root[data-theme="light"] {
    --bg: #f5f7f5; --bg-2: #eef2ee;
    --panel: #ffffff; --panel-2: #f4f8f4;
    --border: #d8e0d8; --border-bright: #b8c8b8;
    --fg: #1a2e1a; --fg-dim: #4a6a4a; --fg-muted: #7a9a7a;
    --neon: #00875a; --neon-dim: #006640;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg); color: var(--fg);
    font-family: var(--mono); font-size: 14px;
    min-height: 100vh; overflow-x: hidden;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,156,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,156,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0) 4px);
    pointer-events: none; z-index: 1; opacity: 0.4;
  }
  :root[data-theme="light"] body::after { opacity: 0.15; }

  .app { position: relative; z-index: 2; max-width: 1480px; margin: 0 auto; padding: 18px; }

  /* === 顶部标题栏 === */
  .titlebar {
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    border: 1px solid var(--border-bright);
    border-bottom: 2px solid var(--neon-dim);
    padding: 10px 16px;
    box-shadow: 0 0 24px rgba(0, 255, 156, 0.08), inset 0 1px 0 rgba(0, 255, 156, 0.1);
    flex-wrap: wrap;
  }
  .dots { display: flex; gap: 7px; flex-shrink: 0; }
  .dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 0 4px rgba(0,0,0,0.4); }
  .dot.r { background: var(--red); }
  .dot.y { background: var(--yellow); }
  .dot.g { background: var(--neon); }
  .title {
    font-weight: 800; font-size: 15px; color: var(--neon);
    letter-spacing: 0.5px; text-shadow: 0 0 8px rgba(0,255,156,0.5);
    flex: 1; min-width: 180px;
  }
  .title .cursor { animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .titlebar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
  .stat-pill {
    height: 30px; padding: 0 12px;
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border-bright);
    color: var(--fg-dim); font-size: 11px; letter-spacing: 0.3px;
  }
  .stat-pill b { color: var(--neon); font-weight: 700; }
  .icon-btn {
    height: 30px; padding: 0 12px;
    background: var(--bg); border: 1px solid var(--border-bright);
    color: var(--neon);
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .icon-btn:hover { border-color: var(--neon); box-shadow: 0 0 12px rgba(0,255,156,0.3); }
  .icon-btn:active { transform: scale(0.96); }
  .icon-btn.loading { opacity: 0.6; pointer-events: none; }
  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .back-link {
    display: flex; align-items: center; height: 30px; padding: 0 12px;
    background: var(--bg); border: 1px solid var(--border-bright);
    color: var(--neon); text-decoration: none;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    transition: all 0.15s; white-space: nowrap;
  }
  .back-link:hover { border-color: var(--neon); box-shadow: 0 0 12px rgba(0,255,156,0.3); }

  /* === 控制条 === */
  .controls {
    display: flex; align-items: center; gap: 12px;
    margin-top: 14px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .controls-label {
    font-size: 11px; color: var(--fg-muted); letter-spacing: 0.5px;
  }
  .toggle-btn {
    background: var(--bg); border: 1px solid var(--border-bright);
    color: var(--fg-dim);
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    padding: 5px 11px; cursor: pointer; transition: all 0.15s;
  }
  .toggle-btn:hover { color: var(--fg); border-color: var(--neon-dim); }
  .toggle-btn.active {
    background: var(--neon); color: #0a0e0a; border-color: var(--neon);
  }

  /* === 卡片网格 === */
  .grid {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border-bright);
    display: flex; flex-direction: column;
    box-shadow: 0 0 18px rgba(0,255,156,0.04);
    min-height: 460px;
  }
  .card-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border-bright);
    font-size: 13px; font-weight: 700; color: var(--neon);
  }
  .card-head .pip { color: var(--neon-dim); }
  .card-head .src-name { color: var(--fg); }
  .card-head .src-status {
    margin-left: auto; font-size: 10px; font-weight: 400;
    color: var(--fg-muted); letter-spacing: 0.3px;
  }
  .card-head .src-status.ok { color: var(--neon-dim); }
  .card-head .src-status.err { color: var(--red); }

  .card-list { list-style: none; padding: 4px 0; flex: 1; }
  .news-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    text-decoration: none; color: inherit;
  }
  .news-item:last-child { border-bottom: none; }
  .news-item:hover { background: var(--panel-2); }
  .news-item:hover .news-title { color: var(--neon); }

  .rank {
    flex-shrink: 0; width: 26px; text-align: center;
    font-weight: 800; font-size: 13px;
    color: var(--fg-muted);
  }
  .news-item:nth-child(1) .rank { color: var(--red); }
  .news-item:nth-child(2) .rank { color: var(--orange); }
  .news-item:nth-child(3) .rank { color: var(--yellow); }

  .news-title {
    flex: 1; font-size: 12.5px; line-height: 1.45;
    color: var(--fg); transition: color 0.12s;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .news-hot {
    flex-shrink: 0; font-size: 10px;
    color: var(--neon-dim); font-weight: 600;
  }

  .card-status {
    padding: 24px 14px; text-align: center;
    color: var(--fg-muted); font-size: 12px; line-height: 1.7;
    flex: 1;
  }
  .card-status.err { color: var(--red); }

  .skeleton-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; border-bottom: 1px solid var(--border);
  }
  .sk {
    background: linear-gradient(90deg, var(--panel-2) 0%, var(--border-bright) 50%, var(--panel-2) 100%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    border-radius: 2px;
  }
  .sk-rank { width: 26px; height: 14px; flex-shrink: 0; }
  .sk-title { flex: 1; height: 12px; }
  .sk-hot { width: 40px; height: 10px; flex-shrink: 0; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* === 页脚 === */
  .footer-note {
    margin-top: 16px; padding: 10px 14px;
    border: 1px solid var(--border); background: var(--panel);
    font-size: 10px; color: var(--fg-muted);
    line-height: 1.6; letter-spacing: 0.3px;
  }
  .footer-note b { color: var(--neon-dim); }
  .footer-note a { color: var(--cyan); text-decoration: none; }
  .footer-note a:hover { text-decoration: underline; }

  /* === 响应式 === */
  @media (max-width: 768px) {
    .app { padding: 10px; }
    .titlebar { gap: 10px; padding: 8px 12px; }
    .title { font-size: 12px; min-width: 120px; }
    .grid { grid-template-columns: 1fr; gap: 10px; }
    .back-link { display: none; }
    .icon-btn, .stat-pill { padding: 0 10px; font-size: 11px; }
    .news-item { padding: 8px 12px; }
    .news-title { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- 顶部标题栏 -->
  <div class="titlebar">
    <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <div class="title">root@newsnow:~# <span class="cursor">▌</span></div>
    <div class="titlebar-actions">
      <div class="stat-pill" id="statPill">已加载 <b id="okCount">0</b>/<b id="totalCount">0</b></div>
      <button class="icon-btn" id="themeBtn" title="切换明/暗主题">🌙</button>
      <button class="icon-btn" id="refreshBtn" title="强制刷新所有源">
        <span id="refreshIcon">⟳</span><span>刷新</span>
      </button>
      <a href="search.html" class="back-link" title="搜索页">搜索</a>
      <a href="index.html" class="back-link" title="返回资源站">← 资源站</a>
    </div>
  </div>

  <!-- 控制条 -->
  <div class="controls">
    <span class="controls-label">// 显示条数：</span>
    <button class="toggle-btn active" data-limit="10">10</button>
    <button class="toggle-btn" data-limit="20">20</button>
    <button class="toggle-btn" data-limit="50">50</button>
    <span class="controls-label" style="margin-left:auto">// 缓存 30 分钟 · 点击「刷新」强制更新</span>
  </div>

  <!-- 卡片网格 -->
  <div class="grid" id="grid"></div>

  <!-- 页脚说明 -->
  <div class="footer-note">
    <b>// 数据源</b>：聚合自公开热点 API（<a href="https://github.com/imsyy/DailyHotApi" target="_blank" rel="noopener">DailyHotApi</a>），无后端、纯前端拉取，缓存 30 分钟。<br>
    <b>// 说明</b>：本页参考 <a href="https://github.com/ourongxing/newsnow" target="_blank" rel="noopener">newsnow</a> 设计，仅做热点聚合展示，点击条目跳转至原平台。如某源长期加载失败，可能是接口变更或限流。<br>
    <b>// 提示</b>：若全部源失败，可能是网络问题或 API 镜像不可用，点击「刷新」重试。
  </div>
</div>

<script>
(function() {
  'use strict';

  // === 数据源配置（多镜像备用，提高可用性）===
  // 每个源配置多个候选 API，按顺序尝试，第一个成功即用
  const MIRRORS = [
    'https://api-hot.201866.xyz',     // 主镜像
    'https://api.vvhan.com/api/hotlist',  // 韩小韩 API（路径不同，单独处理）
    'https://api.oioweb.cn/api/common/HotList?type='  // oioweb 备用
  ];

  // 源列表 - 使用 DailyHotApi 风格的路径
  const SOURCES = [
    { id: 'weibo',    name: '微博',     paths: ['/weibo'] },
    { id: 'zhihu',    name: '知乎',     paths: ['/zhihu'] },
    { id: 'bilibili', name: 'B站',      paths: ['/bilibili'] },
    { id: 'douyin',   name: '抖音',     paths: ['/douyin'] },
    { id: 'baidu',    name: '百度',     paths: ['/baidu'] },
    { id: 'toutiao',  name: '头条',     paths: ['/toutiao'] },
    { id: '163',      name: '网易',     paths: ['/163'] },
    { id: 'ithome',   name: 'IT之家',   paths: ['/ithome'] },
    { id: 'juejin',   name: '掘金',     paths: ['/juejin'] },
    { id: 'csdn',     name: 'CSDN',     paths: ['/csdn'] }
  ];

  const CACHE_PREFIX = 'newsnow_v2_';
  const CACHE_TTL = 30 * 60 * 1000;
  let limit = 10;
  let refreshInFlight = false;

  // === 主题 ===
  const themeBtn = document.getElementById('themeBtn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    themeBtn.textContent = t === 'light' ? '☀' : '🌙';
    themeBtn.title = t === 'light' ? '切换到暗色' : '切换到亮色';
  }
  applyTheme(localStorage.getItem('n0-theme') || 'dark');
  themeBtn.addEventListener('click', function() {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    localStorage.setItem('n0-theme', next);
    applyTheme(next);
  });

  // === 控制条 ===
  document.querySelectorAll('.toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      limit = parseInt(btn.dataset.limit, 10);
      document.querySelectorAll('.toggle-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      // 重新渲染所有已加载的卡片
      SOURCES.forEach(function(src) {
        renderCardFromCache(src);
      });
    });
  });

  // === 网格渲染 ===
  const grid = document.getElementById('grid');
  const okCountEl = document.getElementById('okCount');
  const totalCountEl = document.getElementById('totalCount');
  totalCountEl.textContent = SOURCES.length;

  // 创建所有卡片骨架
  const cardEls = {};
  SOURCES.forEach(function(src) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-head">' +
        '<span class="pip">▸</span>' +
        '<span class="src-name">' + src.name + '</span>' +
        '<span class="src-status" id="stat-' + src.id + '">加载中</span>' +
      '</div>' +
      '<div class="card-list" id="list-' + src.id + '">' + renderSkeleton() + '</div>';
    grid.appendChild(card);
    cardEls[src.id] = card;
  });

  function renderSkeleton() {
    let html = '';
    for (let i = 0; i < 8; i++) {
      html += '<div class="skeleton-item">' +
              '<div class="sk sk-rank"></div>' +
              '<div class="sk sk-title"></div>' +
              '<div class="sk sk-hot"></div>' +
              '</div>';
    }
    return html;
  }

  function updateStat() {
    let ok = 0;
    SOURCES.forEach(function(src) {
      const el = document.getElementById('stat-' + src.id);
      if (el && el.classList.contains('ok')) ok++;
    });
    okCountEl.textContent = ok;
  }

  function renderCard(src, items, fromCache) {
    const listBox = document.getElementById('list-' + src.id);
    const statEl = document.getElementById('stat-' + src.id);
    if (!items || !items.length) {
      listBox.innerHTML = '<div class="card-status">// 暂无数据</div>';
      statEl.textContent = '空';
      statEl.className = 'src-status';
      updateStat();
      return;
    }
    const slice = items.slice(0, limit);
    let html = '';
    slice.forEach(function(item, idx) {
      const rank = String(idx + 1).padStart(2, '0');
      const url = item.url || item.mobileUrl || '#';
      const hot = item.hot ? '<span class="news-hot">' + escapeHtml(item.hot) + '</span>' : '';
      html += '<a class="news-item" href="' + escapeAttr(url) + '" target="_blank" rel="noopener noreferrer">' +
              '<span class="rank">' + rank + '</span>' +
              '<span class="news-title">' + escapeHtml(item.title) + '</span>' +
              hot +
              '</a>';
    });
    listBox.innerHTML = html;
    statEl.textContent = fromCache ? '缓存' : '已更新';
    statEl.className = 'src-status ok';
    updateStat();
  }

  function renderCardError(src, msg) {
    const listBox = document.getElementById('list-' + src.id);
    const statEl = document.getElementById('stat-' + src.id);
    listBox.innerHTML = '<div class="card-status err">// ' + escapeHtml(msg || '拉取失败') + '<br>// 点击「刷新」重试</div>';
    statEl.textContent = '失败';
    statEl.className = 'src-status err';
    updateStat();
  }

  function renderCardFromCache(src) {
    const cached = getCache(src.id);
    if (cached && cached.data) {
      renderCard(src, cached.data, true);
    }
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/`/g, '&#96;');
  }

  function getCache(srcId) {
    try {
      const raw = localStorage.getItem(CACHE_PREFIX + srcId);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (Date.now() - obj.ts > CACHE_TTL) return null;
      return obj;
    } catch (e) { return null; }
  }
  function getCacheAny(srcId) {
    try {
      const raw = localStorage.getItem(CACHE_PREFIX + srcId);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function setCache(srcId, data) {
    try {
      localStorage.setItem(CACHE_PREFIX + srcId, JSON.stringify({ ts: Date.now(), data: data }));
    } catch (e) {}
  }

  // === 拉取单个源（多镜像备用）===
  function fetchSource(src, force) {
    // 先用缓存
    if (!force) {
      const cached = getCache(src.id);
      if (cached) {
        renderCard(src, cached.data, true);
        return Promise.resolve();
      }
    }

    // 按顺序尝试镜像
    return tryMirrors(src, 0)
      .then(function(data) {
        setCache(src.id, data);
        renderCard(src, data, false);
      })
      .catch(function(err) {
        // 失败回退到任何缓存
        const fallback = getCacheAny(src.id);
        if (fallback && fallback.data) {
          renderCard(src, fallback.data, true);
          const statEl = document.getElementById('stat-' + src.id);
          if (statEl) {
            statEl.textContent = '缓存·网络失败';
            statEl.className = 'src-status';
          }
        } else {
          renderCardError(src, err.message || '拉取失败');
        }
      });
  }

  function tryMirrors(src, idx) {
    if (idx >= MIRRORS.length) {
      return Promise.reject(new Error('所有镜像失败'));
    }
    const base = MIRRORS[idx];
    let url;
    if (base.indexOf('vvhan.com') > -1) {
      // 韩小韩 API 路径不同
      const map = { weibo:'wbHot', zhihu:'zhot', bilibili:'biliHot', douyin:'dyHot', baidu:'baiduHot', toutiao:'toutiaoHot', 163:'wangyiHot', ithome:'itHot', juejin:'juejinHot', csdn:'csdnHot' };
      url = base + '/' + (map[src.id] || 'wbHot');
    } else if (base.indexOf('oioweb') > -1) {
      url = base + src.id;
    } else {
      url = base + src.paths[0];
    }

    return fetch(url, { headers: { 'Accept': 'application/json' }, signal: AbortSignal.timeout ? AbortSignal.timeout(8000) : undefined })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(json) {
        // 适配不同 API 响应格式
        let data = [];
        if (Array.isArray(json)) data = json;
        else if (json && Array.isArray(json.data)) data = json.data;
        else if (json && json.data && Array.isArray(json.data.data)) data = json.data.data;
        else if (json && json.result && Array.isArray(json.result)) data = json.result;
        // 归一化字段
        data = data.map(function(item) {
          return {
            title: item.title || item.name || '',
            url: item.url || item.link || item.mobileUrl || item.urlpc || '#',
            hot: item.hot ? String(item.hot) : (item.hotText || item.desc || '')
          };
        }).filter(function(x) { return x.title; });
        if (!data.length) throw new Error('空数据');
        return data;
      })
      .catch(function(err) {
        // 当前镜像失败，尝试下一个
        return tryMirrors(src, idx + 1);
      });
  }

  // === 刷新逻辑 ===
  const refreshBtn = document.getElementById('refreshBtn');
  const refreshIcon = document.getElementById('refreshIcon');

  function refreshAll(force) {
    if (refreshInFlight) return;
    refreshInFlight = true;
    refreshBtn.classList.add('loading');
    refreshIcon.classList.add('spin');

    const tasks = SOURCES.map(function(src) { return fetchSource(src, force); });
    Promise.allSettled(tasks).finally(function() {
      refreshInFlight = false;
      refreshBtn.classList.remove('loading');
      refreshIcon.classList.remove('spin');
    });
  }

  refreshBtn.addEventListener('click', function() {
    refreshAll(true);
  });

  // 首次加载
  refreshAll(false);

  // 每 10 分钟静默刷新
  setInterval(function() { refreshAll(false); }, 10 * 60 * 1000);
})();
</script>
</body>
</html>
